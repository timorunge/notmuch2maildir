version: 2

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm
      - arm64
    ignore:
      - goos: darwin
        goarch: arm
    main: ./cmd/notmuch2maildir
    ldflags:
      - "-s -w -X main.buildDate={{ .Date }} -X main.gitCommit={{ .FullCommit }} -X main.version={{ .Version }}"

archives:
  - name_template: "{{ .ProjectName }}_{{ .Tag }}_{{ .Os }}-{{ .Arch }}"
    files:
      - LICENSE

checksum:
  name_template: "{{ .ProjectName }}_{{ .Tag }}_checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^Merge branch"
      - "^Merge pull request"

release:
  github:
    owner: timorunge
    name: notmuch2maildir
  draft: true
